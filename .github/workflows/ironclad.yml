name: Ironclad Trading Bot

on:
  workflow_dispatch: # Manual trigger only — bot now runs on Railway (Cloudflare blocks GitHub Actions IPs)

permissions:
  contents: write

jobs:
  ironclad:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run Ironclad bot
        env:
          BITGET_API_KEY:      ${{ secrets.BITGET_API_KEY }}
          BITGET_SECRET_KEY:   ${{ secrets.BITGET_SECRET_KEY }}
          BITGET_PASSPHRASE:   ${{ secrets.BITGET_PASSPHRASE }}
          MODE:                futures
          LEVERAGE:            ${{ secrets.LEVERAGE }}
          PORTFOLIO_USD:       ${{ secrets.IRONCLAD_PORTFOLIO_USD }}
          MAX_TRADE_USD:       ${{ secrets.IRONCLAD_MAX_TRADE_USD }}
          MAX_TRADES_PER_DAY:  ${{ secrets.MAX_TRADES_PER_DAY }}
          IRONCLAD_PAPER:      ${{ secrets.IRONCLAD_PAPER }}
        run: node bot-ironclad.js

      - name: Run HYPE position manager
        env:
          BITGET_API_KEY:    ${{ secrets.BITGET_API_KEY }}
          BITGET_SECRET_KEY: ${{ secrets.BITGET_SECRET_KEY }}
          BITGET_PASSPHRASE: ${{ secrets.BITGET_PASSPHRASE }}
        run: node bot-hype-manager.js

      - name: Save trade logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trades-ironclad.csv ironclad-log.json || true
          git add open-positions-ironclad.json           || true
          git add closed-positions-ironclad.json         || true
          git add cooldown-ironclad.json                 || true
          git add hype-state.json                        || true
          git diff --staged --quiet || git commit -m "Ironclad run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push
