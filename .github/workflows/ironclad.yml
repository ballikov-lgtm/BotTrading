name: Ironclad Trading Bot

on:
  workflow_dispatch: # Manual trigger for testing
  schedule:
    # ── WEEKENDS — every 4 hours ──────────────────────────────────────────────
    - cron: '0 0,4,8,12,16,20 * * 0,6'

    # ── WEEKDAYS ──────────────────────────────────────────────────────────────

    # Asian session: 00:00–02:00 UK — every 15 mins
    - cron: '0,15,30,45 0,1 * * 1-5'

    # Quiet period: 02:00–07:00 UK — every hour
    - cron: '0 2,3,4,5,6 * * 1-5'

    # London open: 07:00–10:00 UK — every 15 mins
    - cron: '0,15,30,45 7,8,9 * * 1-5'

    # Mid-morning: 10:00–13:00 UK — every 30 mins
    - cron: '0,30 10,11,12 * * 1-5'

    # US open + overlap: 13:00–17:00 UK — every 15 mins
    - cron: '0,15,30,45 13,14,15,16 * * 1-5'

    # Afternoon: 17:00–20:00 UK — every 30 mins
    - cron: '0,30 17,18,19 * * 1-5'

    # US close: 20:00–22:00 UK — every 15 mins
    - cron: '0,15,30,45 20,21 * * 1-5'

    # Wind down: 22:00–00:00 UK — every hour
    - cron: '0 22,23 * * 1-5'

permissions:
  contents: write

jobs:
  ironclad:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run Ironclad bot
        env:
          BITGET_API_KEY:      ${{ secrets.BITGET_API_KEY }}
          BITGET_SECRET_KEY:   ${{ secrets.BITGET_SECRET_KEY }}
          BITGET_PASSPHRASE:   ${{ secrets.BITGET_PASSPHRASE }}
          MODE:                futures
          LEVERAGE:            ${{ secrets.LEVERAGE }}
          PORTFOLIO_USD:       ${{ secrets.IRONCLAD_PORTFOLIO_USD }}
          MAX_TRADE_USD:       ${{ secrets.IRONCLAD_MAX_TRADE_USD }}
          MAX_TRADES_PER_DAY:  ${{ secrets.MAX_TRADES_PER_DAY }}
          IRONCLAD_PAPER:      ${{ secrets.IRONCLAD_PAPER }}
        run: node bot-ironclad.js

      - name: Save trade logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trades-ironclad.csv ironclad-log.json || true
          git add open-positions-ironclad.json           || true
          git add closed-positions-ironclad.json         || true
          git add cooldown-ironclad.json                 || true
          git diff --staged --quiet || git commit -m "Ironclad run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push
