name: SID Swing Bot

on:
  workflow_dispatch: # Manual trigger for testing

  schedule:
    # ── WEEKDAYS ONLY — once per day at 14:35 UTC (9:35am ET) ────────────────
    # Runs 5 minutes after US market open to allow the daily candle to settle.
    # SID is a daily-chart swing strategy — one scan per day is all that's needed.
    - cron: '35 14 * * 1-5'

permissions:
  contents: write

jobs:
  sid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run SID bot
        working-directory: SID
        env:
          # ── SID strategy config ──────────────────────────────────────────
          SID_ACCOUNT_USD:     ${{ secrets.SID_ACCOUNT_USD }}
          SID_RISK_PCT:        ${{ secrets.SID_RISK_PCT }}
          SID_MAX_POS_PCT:     ${{ secrets.SID_MAX_POS_PCT }}
          SID_MAX_POSITIONS:   ${{ secrets.SID_MAX_POSITIONS }}
          SID_MAX_PER_DAY:     ${{ secrets.SID_MAX_PER_DAY }}
          SID_EARNINGS_WINDOW: ${{ secrets.SID_EARNINGS_WINDOW }}
          SID_PAPER:           ${{ secrets.SID_PAPER }}

          # ── Alpaca execution (see SID-ALPACA-SETUP.md for setup) ─────────
          # SID_TRADING_MODE controls what happens with each signal:
          #   dry_run (default if secret unset) — no Alpaca calls, log only
          #   paper                              — Alpaca paper account
          #   live                               — Alpaca live account
          #                                        (also requires SID_LIVE_CONFIRMED
          #                                         = YES_I_REALLY_MEAN_IT)
          # If ALPACA_KEY_ID / ALPACA_SECRET_KEY are unset, the executor
          # automatically falls back to dry_run regardless of mode.
          SID_TRADING_MODE:    ${{ secrets.SID_TRADING_MODE }}
          SID_LIVE_CONFIRMED:  ${{ secrets.SID_LIVE_CONFIRMED }}
          ALPACA_KEY_ID:       ${{ secrets.ALPACA_KEY_ID }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     ${{ secrets.ALPACA_BASE_URL }}

          # ── Telegram alerts (see SID-TELEGRAM-SETUP.md) ──────────────────
          # All three are optional. If BOT_TOKEN or CHAT_ID is missing, the
          # bot silently skips alerts and trades normally.
          # Set TELEGRAM_ALERTS_ENABLED=false to disable temporarily without
          # removing the secrets.
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALERTS_ENABLED:  ${{ secrets.TELEGRAM_ALERTS_ENABLED }}
        run: node bot-sid.js

      - name: Save trade logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SID/trades-sid.csv SID/sid-log.json          || true
          git add SID/open-positions-sid.json                    || true
          git add SID/closed-positions-sid.json                  || true
          git add SID/sid-account.json                           || true
          git diff --staged --quiet || git commit -m "SID run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push
