name: Daily Market Research

on:
  schedule:
    - cron: '0 8 * * *'   # 9am UK (BST) / 8am UTC
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write           # Needed to push dashboard to repo

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run research agent
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: node research.js

      - name: Publish dashboard to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
