name: Daily Market Research

on:
  schedule:
    - cron: '0 8 * * *'   # 9am UK (BST) / 8am UTC  — morning briefing
    - cron: '0 17 * * *'  # 6pm UK (BST) / 5pm UTC  — end of day review
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write           # Needed to push dashboard to repo

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: npm install

      - name: Install Python deps for SID scanner
        run: pip install --quiet yfinance pandas

      - name: Fetch live trade history from logs branch
        run: |
          git fetch origin logs
          git checkout origin/logs -- trades-ironclad.csv          || echo "No trades-ironclad.csv on logs branch yet — skipping"
          git checkout origin/logs -- closed-positions-ironclad.json || echo "No closed-positions-ironclad.json on logs branch yet — skipping"
          git checkout origin/logs -- open-positions-ironclad.json   || echo "No open-positions-ironclad.json on logs branch yet — skipping"

      - name: Run position monitor
        run: node monitor.js

      - name: Run SID watchlist scanner
        # Refreshes SID/scanner-sid.json for the SID Scanner + Heatmap tabs.
        # continue-on-error: a Yahoo outage shouldn't block the dashboard publish.
        working-directory: SID
        continue-on-error: true
        run: node scan-sid.js

      - name: Run research agent
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: node research.js

      - name: Publish dashboard to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html research-signals.json
          git add closed-positions-ironclad.json || true
          git add closed-positions-vwap.json      || true
          git add SID/closed-positions-sid.json   || true
          git add SID/scanner-sid.json            || true
          git diff --staged --quiet || git commit -m "Dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push
