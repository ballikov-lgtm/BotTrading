name: Run Trading Bot

on:
  workflow_dispatch: # Manual trigger for testing
  schedule:
    # ── WEEKENDS (Sat=6, Sun=0) — every 4 hours ──────────────────────────────
    - cron: '0 0,4,8,12,16,20 * * 0,6'

    # ── WEEKDAYS (Mon–Fri) ────────────────────────────────────────────────────

    # Asian session: 00:00–02:00 UK (UTC) — every 15 mins
    - cron: '0,15,30,45 0,1 * * 1-5'

    # Quiet period: 02:00–07:00 UK (UTC) — every hour
    - cron: '0 2,3,4,5,6 * * 1-5'

    # London open: 07:00–10:00 UK (UTC) — every 15 mins
    - cron: '0,15,30,45 7,8,9 * * 1-5'

    # Mid-morning: 10:00–13:00 UK (UTC) — every 30 mins
    - cron: '0,30 10,11,12 * * 1-5'

    # US open + London overlap: 13:00–17:00 UK (UTC) — every 15 mins
    - cron: '0,15,30,45 13,14,15,16 * * 1-5'

    # Afternoon: 17:00–20:00 UK (UTC) — every 30 mins
    - cron: '0,30 17,18,19 * * 1-5'

    # US close volatility: 20:00–22:00 UK (UTC) — every 15 mins
    - cron: '0,15,30,45 20,21 * * 1-5'

    # Wind down: 22:00–00:00 UK (UTC) — every hour
    - cron: '0 22,23 * * 1-5'

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run bot
        env:
          BITGET_API_KEY:      ${{ secrets.BITGET_API_KEY }}
          BITGET_SECRET_KEY:   ${{ secrets.BITGET_SECRET_KEY }}
          BITGET_PASSPHRASE:   ${{ secrets.BITGET_PASSPHRASE }}
          MODE:                ${{ secrets.MODE }}
          LEVERAGE:            ${{ secrets.LEVERAGE }}
          PORTFOLIO_USD:       ${{ secrets.PORTFOLIO_USD }}
          MAX_TRADE_USD:       ${{ secrets.MAX_TRADE_USD }}
          MAX_TRADES_PER_DAY:  ${{ secrets.MAX_TRADES_PER_DAY }}
          TIMEFRAME:           ${{ secrets.TIMEFRAME }}
          PAPER_TRADING:       ${{ secrets.PAPER_TRADING }}
        run: node bot.js

      - name: Save trade logs to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trades.csv safety-check-log.json || true
          git diff --staged --quiet || git commit -m "Bot run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
